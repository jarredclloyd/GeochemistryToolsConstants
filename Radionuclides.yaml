# Radionuclide information relevant to geochronology.
# Units of seconds are used to minimise rounding errors during computation and enable computation of the half life/decay constant in years using a user specified year definition (e.g. tropical, IUGS annus)
# Ensure units is in a string compatible with Unitful.jl (s or yr with standard SI prefixes e.g. Gyr)
# Uncertainty follows that of GUM (aka the combined standard uncertainty). Coverage factor, k, is = 2.
# beta_plus decay is considered by the NuBASE definition as such it includes electron capture and positron emission.

U238:
  reference: VillaEtAl2016 doi:10.1016/j.gca.2015.10.011
  half_life: { value: 1.4100882408e+17, uncertainty: 3.0295296e+14, units: s }
  decay_constant:
    {
      value: 4.915629820206819e-18,
      uncertainty: 1.0561073847768829e-20,
      units: 1/s,
    }
  decays:
    - daughter: Pb206
      mode: alpha
      branch: { value: 1.0, uncertainty: 0.0 }
